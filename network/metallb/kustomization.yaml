apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: network-system

resources:
- topology.yaml

helmGlobals:
  chartHome: .charts

helmCharts:
- name: metallb
  repo: https://metallb.github.io/metallb
  version: 0.15.3
  releaseName: metallb
  namespace: network-system
  additionalValuesFiles:
  - values.metallb.yaml