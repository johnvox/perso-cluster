apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://github.com/jynolen/perso-cluster
    path: argocd
    targetRevision: HEAD
  - repoURL: https://github.com/jynolen/perso-cluster
    path: argocd/routes
    targetRevision: HEAD    
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true