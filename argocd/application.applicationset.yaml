apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications-charts
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      requeueAfterSeconds: 10
      repoURL: https://github.com/jynolen/perso-cluster.git
      revision: main
      files:
      - path: 'applications/backbone/*/kustomization.yaml'
      - path: 'applications/system/*/kustomization.yaml'
      - path: 'applications/client/*/kustomization.yaml'
      values:
        server: https://kubernetes.default.svc
  templatePatch: |
    metadata:
      labels: {{. | dig "metadata" "labels" (dict) | toRawJson }}
      annotations:  {{. | dig "metadata" "annotations" (dict) | toRawJson }}
    spec:
      revisionHistoryLimit: {{ . | dig "metadata" "annotations" "argocd.argoproj.io/revisionHistoryLimit" 3 }}
      {{- if  (. | dig "metadata" "annotations" "argocd.argoproj.io/sourceHydrator" nil)  }}
      ignoreDifferences: {{ dig "metadata" "annotations" "argocd.argoproj.io/ignoreDifferences" "[]" | fromJson | toRawJson }}
      {{- end }}
      {{- if  (. | dig "metadata" "annotations" "argocd.argoproj.io/sourceHydrator" nil)  }}
      sourceHydrator: {{  . | dig "metadata" "annotations" "argocd.argoproj.io/sourceHydrator" "{}" | fromJson | toRawJson }}
      {{- end }}
      {{- if  (. | dig "metadata" "annotations" "argocd.argoproj.io/syncPolicy" nil)  }}
      syncPolicy: {{ . | dig "metadata" "annotations" "argocd.argoproj.io/syncPolicy" "{}" | fromJson | toRawJson }}
      {{- end }}
  template:
    metadata:
      name: '{{ index .path.segments 1 }}-{{ .path.basename }}'
    spec:
      project: application
      source:
        repoURL: https://github.com/jynolen/perso-cluster
        path: '{{ .path.path }}'
        targetRevision: '{{ . | dig "metadata" "annotations" "argocd.argoproj.io/revision" "HEAD" }}'
      destination:
        server: '{{ .values.server }}'
        namespace: '{{ coalesce (. | dig "namespace" nil) (. | dig "metadata" "annotations" "argocd.argoproj.io/namespace" nil ) }}'
      syncPolicy:
        syncOptions:
          - CreateNamespace={{ coalesce (. | dig "namespace" nil) (. | dig "metadata" "annotations" "argocd.argoproj.io/namespace" nil ) | any }}
  syncPolicy:
    applicationsSync: create-update