---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: casdoor
spec:
  parentRef:
    group: gateway.networking.k8s.io	
    kind: Gateway
    name: envoy-proxy-open
    namespace: backbone
  listeners:
  - name: casdoor-https
    protocol: HTTPS
    hostname: casdoor.open.jynolen.fr
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: casdoor-jynolen-tls
        group: ''	
        kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: casdoor
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: casdoor
  hostnames:
    - casdoor.open.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: casdoor
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /