---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: echoserver
spec:
  parentRef:
    group: gateway.networking.k8s.io	
    kind: Gateway
    name: envoy-proxy
    namespace: backbone
  listeners:
  - name: echoserver-https
    protocol: HTTPS
    hostname: webhook.jynolen.fr
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: echoserver-jynolen-tls
        group: ''	
        kind: Secret
  - name: echoserver-auth-https
    protocol: HTTPS
    hostname: echoserver.jynolen.fr
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: echoserver-auth-jynolen-tls
        group: ''	
        kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webhook
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: echoserver
  hostnames:
  - webhook.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: webhook
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echoserver
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: echoserver
  hostnames:
  - echoserver.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: echoserver
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /