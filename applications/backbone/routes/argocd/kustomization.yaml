apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
- route.yaml
- webhook.route.yaml
- workload.yaml

images:
- name: github-webhook-validator
  newName: ghcr.io/johnvox/github-webhook-validator
  newTag: v1.0.0

labels:
- pairs:
    app.kubernetes.io/name: github-token-validator
  includeSelectors: true
  includeTemplates: true