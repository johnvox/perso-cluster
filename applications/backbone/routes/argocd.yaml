---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRef:
    group: gateway.networking.k8s.io	
    kind: Gateway
    name: envoy-proxy
    namespace: backbone
  listeners:
  - name: foo
    hostname: "*.argocd.jynolen.fr"
    protocol: HTTP
    port: 80
  - name: wild-https
    protocol: HTTPS
    hostname: "*.argocd.jynolen.fr"
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: argocd-jynolen-tls
        group: ''	
        kind: Secret
  - name: https
    protocol: HTTPS
    hostname: "argocd.jynolen.fr"
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: argocd-jynolen-tls
        group: ''	
        kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webhook-argocd-server
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.jynolen.fr
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: argocd
  hostnames:
    - webhook.argocd.jynolen.fr
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: argocd-server
      port: 80
      weight: 1
    matches:
    - path:
        type: Exact
        value: /api/webhook
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/target: gw.jynolen.fr
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: argocd
  hostnames:
    - argocd.jynolen.fr
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: argocd-server
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /