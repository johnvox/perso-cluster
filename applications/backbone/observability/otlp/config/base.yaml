
extensions:
  health_check:
    endpoint: ${env:MY_POD_IP}:13133

exporters:
  nop:
  debug:
    verbosity: detailed
    use_internal_logger: false
    output_paths:
      - stderr
receivers:
  nop:

processors:
  batch: {}
  filter/drop:
    log_conditions:
    - resource.attributes["otel.drop"] == "true"
    trace_conditions:
    - resource.attributes["otel.drop"] == "true"
    metric_conditions:
    - resource.attributes["otel.drop"] == "true"
    profile_conditions:
    - resource.attributes["otel.drop"] == "true"
  
  k8s_attributes:
    extract:
      metadata:
      - k8s.namespace.name
      - k8s.pod.name
      - k8s.pod.uid
      - k8s.node.name
      - k8s.pod.start_time
      - k8s.deployment.name
      - k8s.replicaset.name
      - k8s.replicaset.uid
      - k8s.daemonset.name
      - k8s.daemonset.uid
      - k8s.job.name
      - k8s.job.uid
      - k8s.container.name
      - k8s.cronjob.name
      - k8s.statefulset.name
      - k8s.statefulset.uid
      - container.image.tag
      - container.image.name
      - k8s.cluster.uid
      - service.namespace
      - service.name
      - service.version
      - service.instance.id
      otel_annotations: true
    filter:
      node_from_env_var: K8S_NODE_NAME
    passthrough: false
    pod_association:
    - sources:
      - from: resource_attribute
        name: k8s.pod.ip
    - sources:
      - from: resource_attribute
        name: k8s.pod.uid
    - sources:
      - from: connection
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

connectors:
  forward:
  forward/output:

service:
  extensions:
  - health_check
  pipelines:
    logs:
      exporters:
      - forward
      processors:
      - k8s_attributes
      - filter/drop
      - memory_limiter
      - batch
      receivers:
      - otlp
      - file_log
    metrics:
      exporters:
      - forward
      processors:
      - k8s_attributes
      - filter/drop      
      - memory_limiter
      - batch
      receivers:
      - otlp
      # - prometheus
    traces:
      exporters:
      - forward
      processors:
      - k8s_attributes
      - filter/drop      
      - memory_limiter
      - batch
      receivers:
      - otlp
      - jaeger
      - zipkin
    logs/__tonop__:
      receivers: [forward, forward/output]
      exporters: [nop]
    traces/_tonop__:
      receivers: [forward, forward/output]
      exporters: [nop]
    metrics/_tonop__:
      receivers: [forward, forward/output]
      exporters: [nop]
    logs/_fromnop__:
      receivers: [nop]
      exporters: [forward, forward/output]
    traces/_fromnop__:
      receivers: [nop]
      exporters: [forward, forward/output]
    metrics/_fromnop__:
      receivers: [nop]
      exporters: [forward, forward/output]