apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: argocd-secret
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  dataFrom:
    - find:
        path: /argocd