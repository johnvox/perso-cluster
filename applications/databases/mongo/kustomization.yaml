apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations: 
    argocd.argoproj.io/revision: main

helmGlobals:
  chartHome: .charts

helmCharts:
- name: mongodb-kubernetes
  version: 1.8.0
  repo: https://mongodb.github.io/helm-charts
  releaseName: mongodb-kubernetes
  additionalValuesFiles:
  - values.mongo.yaml