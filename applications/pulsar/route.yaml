---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: pulsar
spec:
  parentRef:
    group: gateway.networking.k8s.io	
    kind: Gateway
    name: envoy-proxy
    namespace: backbone
  listeners:
  - name: pulsar-https
    protocol: HTTPS
    hostname: pulsar.jynolen.fr
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: pulsar-jynolen-tls
        group: ''	
        kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulsar
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: pulsar
  hostnames:
    - pulsar.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: pulsar-proxy
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /proxy
    - backendRefs:
      - group: ""
        kind: Service
        name: pulsar-dekaf
        port: 8090
        weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /dekaf