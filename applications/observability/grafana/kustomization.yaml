apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations: 
    argocd.argoproj.io/revision: main

namespace: observability

labels:
- pairs:
    app.kubernetes.io/component: grafana
  includeSelectors: true
  includeTemplates: true
  fields:
  - path: /spec/deployment/metadata/labels
    kind: Grafana
    create: true
  - path: /spec/deployment/spec/template/metadata/labels
    kind: Grafana
    create: true
  - path: /spec/instanceSelector/matchLabels
    kind: GrafanaFolder
    create: true
  - path: /spec/instanceSelector/matchLabels
    kind: GrafanaDatasource
    create: true
  
resources:
- grafana.yaml
- secrets.yaml