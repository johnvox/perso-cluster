apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: splunk-standalone
  annotations:
    reloader.stakater.com/rollout-strategy: "restart"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  serviceName: splunk
  template:
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: splunk-config-env
          image: docker.io/splunk/splunk:10.2.2
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              port: 8000
              scheme: HTTP
              path: /
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 30
          startupProbe:
            httpGet:
              port: 8000
              scheme: HTTP
              path: /
            failureThreshold: 12
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 30
          name: splunk
          ports:
            - containerPort: 8000
              name: http-splunkweb
              protocol: TCP
            - containerPort: 8088
              name: http-hec
              protocol: TCP
            - containerPort: 8089
              name: https-splunkd
              protocol: TCP
            - containerPort: 9997
              name: tcp-s2s
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            runAsUser: 41812
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /mnt/config
              name: config
            - mountPath: /mnt/splunk-secrets
              name: mnt-splunk-secrets
            - mountPath: /opt/splunk/etc
              name: pvc-etc
            - mountPath: /opt/splunk/var
              name: pvc-var
      securityContext:
        fsGroup: 41812
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 41812
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            name: splunk-config
          name: config
        - name: mnt-splunk-secrets
          secret:
            defaultMode: 420
            secretName: splunk-secret
  updateStrategy:
    type: OnDelete
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: pvc-etc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 4Gi
        volumeMode: Filesystem
        storageClassName: longhorn
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: pvc-var
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
        volumeMode: Filesystem
        storageClassName: longhorn
