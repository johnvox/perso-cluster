apiVersion: v1
kind: Service
metadata:
  name: splunk
spec:
  ports:
    - name: http-splunkweb
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: http-hec
      port: 8088
      protocol: TCP
      targetPort: 8088
    - name: https-splunkd
      port: 8089
      protocol: TCP
      targetPort: 8089
    - name: tcp-s2s
      port: 9997
      protocol: TCP
      targetPort: 9997
  type: ClusterIP