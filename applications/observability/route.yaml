apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: splunk
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: observability
  hostnames:
  - observability.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: splunk
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /splunk/en-US
    - filters:
      - type: RequestRedirect
        requestRedirect:
          path:
            type: ReplaceFullPath
            replaceFullPath: /splunk/en-US
          statusCode: 308
      matches:
        - path:
            type: Exact
            value: /splunk
