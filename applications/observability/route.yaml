---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: observability
spec:
  parentRef:
    group: gateway.networking.k8s.io	
    kind: Gateway
    name: envoy-proxy
    namespace: backbone
  listeners:
  - name: observability-https
    protocol: HTTPS
    hostname: observability.jynolen.fr
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: observability-jynolen-tls
        group: ''	
        kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: observability
  hostnames:
  - observability.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: grafana-service
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /grafana
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: observability
  hostnames:
  - observability.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: alertmanager-operated
          port: 9093
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /alertmanager
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: observability
  hostnames:
  - observability.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: prometheus-operated
          port: 9090
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /prometheus
