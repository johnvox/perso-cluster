extensions:
  health_check:
    endpoint: ${env:MY_POD_IP}:13133

service:
  extensions:
  - health_check
  telemetry:
    logs:
      level: ${env:OTEL_LOG_LEVEL:-WARN}
      sampling:
        enabled: false
    metrics:
      readers:
      - pull:
          exporter:
            prometheus:
              host: ${env:MY_POD_IP}
              port: 8888
    resource:
      attributes: 
      - name: host.name
        value: ${env:OTEL_K8S_NODE_NAME}
      - name: k8s.namespace.name
        value: ${env:OTEL_K8S_NAMESPACE}
      - name: k8s.node.ip
        value: ${env:OTEL_K8S_NODE_IP}
      - name: k8s.node.name
        value: ${env:OTEL_K8S_NODE_NAME}
      - name: k8s.pod.ip
        value: ${env:OTEL_K8S_POD_IP}
      - name: k8s.pod.name
        value: ${env:OTEL_K8S_POD_NAME}