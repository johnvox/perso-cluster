---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: tekton
spec:
  parentRef:
    group: gateway.networking.k8s.io	
    kind: Gateway
    name: envoy-proxy
    namespace: backbone
  listeners:
  - name: tekton-auth-https
    protocol: HTTPS
    hostname: tekton.jynolen.fr
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: tekton-auth-jynolen-tls
        group: ''	
        kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tekton
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: tekton
  hostnames:
  - tekton.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: tekton-dashboard
          port: 9097
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /