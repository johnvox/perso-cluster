apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  annotations:
    argocd.argoproj.io/namespace: tekton
    argocd.argoproj.io/ignoreDifferences: '[{"group":"apiextensions.k8s.io","kind":"CustomResourceDefinition","jsonPointers":["/spec/preserveUnknownFields"]}]'
resources:
- https://github.com/tektoncd/pipeline/releases/download/v1.12.0/release.yaml
- https://github.com/tektoncd/pipelines-as-code/releases/download/v0.46.0/release.k8s.yaml
- https://github.com/tektoncd/dashboard/releases/download/v0.68.0/release-full.yaml
- https://infra.tekton.dev/tekton-releases/triggers/previous/v0.35.0/release.yaml
- https://infra.tekton.dev/tekton-releases/triggers/previous/v0.35.0/interceptors.yaml
- route.yaml

patches:
- target:
    version: v1
    kind: CustomResourceDefinition
  patch: |-
    - op: add
      path: /metadata/annotations/argocd.argoproj.io~1sync-options
      value: ServerSideApply=true