apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberchef
spec:
  replicas: 1
  template:
    spec:
      containers:
      - image: ghcr.io/gchq/cyberchef:latest
        imagePullPolicy: IfNotPresent
        name: cyberchef
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "200m"
            memory: "100Mi"
          requests:
            cpu: "100m"
            memory: "50Mi"
---