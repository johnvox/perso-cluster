apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook
  template:
    metadata:
      labels:
        app: webhook
    spec:
      containers:
      - image: ghcr.io/tarampampam/webhook-tester:2.3.0
        imagePullPolicy: IfNotPresent
        name: webhook
        ports:
        - containerPort: 8080
        env:
        - name: AUTO_CREATE_SESSIONS
          value: "true"
        - name: LOG_LEVEL
          value: "error"
        resources:
          limits:
            cpu: "200m"
            memory: "100Mi"
          requests:
            cpu: "100m"
            memory: "50Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echoserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echoserver
  template:
    metadata:
      labels:
        app: echoserver
    spec:
      containers:
      - image: ghcr.io/tsaarni/echoserver@sha256:8398a8c8a67dfe914c100eb5ad75a4a2e66c77ba473bbb67ccdbc03c7b0451ec
        imagePullPolicy: IfNotPresent
        name: echoserver
        ports:
        - containerPort: 8080
        env:
        - name: LOG_LEVEL
          value: "error"
        resources:
          limits:
            cpu: "200m"
            memory: "100Mi"
          requests:
            cpu: "100m"
            memory: "50Mi"
---