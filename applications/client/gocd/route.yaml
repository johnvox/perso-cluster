---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: gocd
spec:
  parentRef:
    group: gateway.networking.k8s.io	
    kind: Gateway
    name: envoy-proxy
    namespace: backbone
  listeners:
  - name: gocd-https
    protocol: HTTPS
    hostname: gocd.jynolen.fr
    port: 443
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: gocd-jynolen-tls
        group: ''	
        kind: Secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: ListenerSet
      name: gocd
  hostnames:
  - gocd.jynolen.fr
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: gocd
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /