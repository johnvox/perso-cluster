application:
  namespace: envoy-gateway-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

charts:
- repoURL: docker.io/envoyproxy
  chart: gateway-helm
  targetRevision: v1.8.0-rc.0
  helm:
    skipCrds: true
- repoURL: docker.io/envoyproxy
  chart: gateway-crds-helm
  targetRevision: v1.8.0-rc.0
