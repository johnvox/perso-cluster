sources: ["gateway-httproute", "gateway-tcproute", "gateway-udproute"]
provider: cloudflare

image:
  tag: v0.21.0

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-dns
        key: apiKey
  - name: CF_API_EMAIL
    valueFrom:
      secretKeyRef:
        name: cloudflare-dns
        key: email
  - name: EXTERNAL_DNS_ZONE_ID_FILTER
    value: "c2207e50a82b876f194208f5170a3c34"
  - name: EXTERNAL_DNS_CLOUDFLARE_PROXIED
    value: "false"
  - name: EXTERNAL_DNS_TXT_WILDCARD_REPLACEMENT
    value: wildcard
  - name: EXTERNAL_DNS_TXT_PREFIX
    value: _extdns_